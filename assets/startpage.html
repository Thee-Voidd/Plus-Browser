<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plus Browser</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      html, body {
          margin: 0 !important;
          padding: 0 !important;
          min-height: 100vh !important;
          font-family: 'Inter', sans-serif !important;
          color: #ffffff !important;
          background-color: #0e0e0e !important;
          background-image: 
              radial-gradient(
                  circle at top center,
                  rgba(255, 220, 240, 0.15) 0%,
                  transparent 55%
              ),
              linear-gradient(
                  to bottom,
                  #303030,
                  #0e0e0e
              ) !important;
          background-attachment: fixed !important;
      }

      body::before {
          content: "";
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: url("https://www.transparenttextures.com/patterns/otis-redding.png");
          opacity: 0.45;
          pointer-events: none;
          z-index: 1;
      }

      .content-container {
          position: relative;
          z-index: 10;
      }

      input[type="search"]::-webkit-search-cancel-button {
          -webkit-appearance: none;
          appearance: none;
          height: 18px;
          width: 18px;
          cursor: pointer;
          background-color: #9ca3af;
          mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>') no-repeat 50% 50%;
          -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>') no-repeat 50% 50%;
          transition: background-color 0.2s ease;
      }

      input[type="search"]::-webkit-search-cancel-button:hover {
          background-color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="content-container flex flex-col justify-center items-center min-h-screen p-4">
      <img
        src="public/logo.png"
        alt="Plus Browser Logo"
        class="w-32 h-32 mb-8 drop-shadow-lg"
        onerror="this.style.display='none'"
      />

      <div class="w-full max-w-2xl">

        <form action="https://www.google.com/search" method="GET" class="relative flex items-center w-full mb-8">
          <svg 
            class="absolute left-4 w-5 h-5 text-gray-400 pointer-events-none z-20" 
            xmlns="http://www.w3.org/2000/svg" 
            fill="none" 
            viewBox="0 0 24 24" 
            stroke-width="2" 
            stroke="currentColor"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
          </svg>

          <input
            type="search"
            name="q"
            placeholder="Search the web..."
            class="w-full rounded-2xl bg-black/40 border border-white/20 pl-12 pr-5 py-4 text-lg text-white outline-none focus:border-purple-500 focus:bg-zinc-900/80 transition backdrop-blur-md relative z-10"
            autofocus
            required
          />
        </form>

        <div id="shortcuts-grid" class="grid grid-cols-4 sm:grid-cols-6 gap-4">
        </div>
      </div>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden">
      <div class="bg-zinc-900 border border-white/10 rounded-2xl p-6 w-full max-w-md shadow-2xl">
        <h3 class="text-xl font-medium text-white mb-4">Add Shortcut</h3>
        
        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1">Name</label>
          <input 
            type="text" 
            id="shortcut-name" 
            placeholder="YouTube" 
            class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-2 text-white outline-none focus:border-purple-500 transition"
            onkeydown="if(event.key === 'Enter') saveShortcut()"
          >
        </div>
        
        <div class="mb-6">
          <label class="block text-sm text-gray-400 mb-1">URL</label>
          <input 
            type="text" 
            id="shortcut-url" 
            placeholder="youtube.com" 
            class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-2 text-white outline-none focus:border-purple-500 transition"
            onkeydown="if(event.key === 'Enter') saveShortcut()"
          >
        </div>

        <div class="flex justify-end gap-3">
          <button 
            type="button" 
            onclick="closeModal()" 
            class="px-4 py-2 text-sm text-gray-400 hover:text-white transition"
          >
            Cancel
          </button>
          <button 
            type="button" 
            onclick="saveShortcut()" 
            class="px-5 py-2 text-sm bg-purple-600 hover:bg-purple-500 text-white rounded-xl font-medium transition"
          >
            Save
          </button>
        </div>
      </div>
    </div>

    <script>
      const defaultShortcuts = [
        { name: 'Google', url: 'https://google.com' },
        { name: 'YouTube', url: 'https://youtube.com' },
        { name: 'GitHub', url: 'https://github.com' }
      ];

      function getShortcuts() {
        const data = localStorage.getItem('plus_shortcuts');
        return data ? JSON.parse(data) : defaultShortcuts;
      }

      function renderShortcuts() {
        const shortcuts = getShortcuts();
        const grid = document.getElementById('shortcuts-grid');
        grid.innerHTML = '';

        shortcuts.forEach((s, index) => {
          let domain = s.url;
          try {
            domain = new URL(s.url.startsWith('http') ? s.url : 'https://' + s.url).hostname;
          } catch (e) {}

          const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;

          const tile = document.createElement('div');
          tile.className = 'relative group flex flex-col items-center justify-center p-3 rounded-2xl bg-black/20 hover:bg-white/10 border border-white/5 hover:border-white/20 transition cursor-pointer backdrop-blur-sm';
          
          tile.innerHTML = `
            <button type="button" onclick="event.stopPropagation(); deleteShortcut(${index})" class="absolute top-1 right-1 w-5 h-5 bg-zinc-800 hover:bg-red-500 text-gray-400 hover:text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition text-xs z-20">✕</button>
            <a href="${s.url}" class="flex flex-col items-center w-full text-center text-decoration-none">
              <div class="w-10 h-10 mb-2 rounded-xl bg-white/5 flex items-center justify-center overflow-hidden">
                <img src="${faviconUrl}" alt="${s.name}" class="w-6 h-6 object-contain" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' fill=\'none\' viewBox=\'0 0 24 24\' stroke=\'%23a1a1aa\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M21 12a9 9 0 11-18 0 9 9 0 0118 0z\'/></svg>'">
              </div>
              <span class="text-xs text-gray-300 group-hover:text-white truncate w-full">${s.name}</span>
            </a>
          `;
          grid.appendChild(tile);
        });

        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.onclick = openModal;
        addBtn.className = 'flex flex-col items-center justify-center p-3 rounded-2xl bg-black/20 hover:bg-white/10 border border-dashed border-white/20 hover:border-white/40 transition cursor-pointer backdrop-blur-sm group';
        addBtn.innerHTML = `
          <div class="w-10 h-10 mb-2 rounded-xl bg-white/5 flex items-center justify-center text-gray-400 group-hover:text-white transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          </div>
          <span class="text-xs text-gray-400 group-hover:text-white">Add</span>
        `;
        grid.appendChild(addBtn);
      }

      function openModal() {
        document.getElementById('add-modal').classList.remove('hidden');
        document.getElementById('shortcut-name').focus();
      }

      function closeModal() {
        document.getElementById('add-modal').classList.add('hidden');
        document.getElementById('shortcut-name').value = '';
        document.getElementById('shortcut-url').value = '';
      }

      function saveShortcut() {
        const nameInput = document.getElementById('shortcut-name');
        const urlInput = document.getElementById('shortcut-url');
        
        const name = nameInput.value.trim();
        let url = urlInput.value.trim();

        if (!name || !url) return;

        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          url = 'https://' + url;
        }

        const shortcuts = getShortcuts();
        shortcuts.push({ name, url });
        localStorage.setItem('plus_shortcuts', JSON.stringify(shortcuts));
        
        closeModal();
        renderShortcuts();
      }

      function deleteShortcut(index) {
        const shortcuts = getShortcuts();
        shortcuts.splice(index, 1);
        localStorage.setItem('plus_shortcuts', JSON.stringify(shortcuts));
        renderShortcuts();
      }

      renderShortcuts();
    </script>
  </body>
</html>
